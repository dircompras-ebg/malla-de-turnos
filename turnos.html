<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malla de Turnos — El Buen Gusto</title>
<link rel="stylesheet" href="turnos.css">
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-logo">El Buen Gusto · Dpto. Abastecimiento</div>
    <div class="header-title">Malla de Turnos</div>
    <div class="header-semana" id="header-semana">Cargando...</div>
  </div>
  <div class="week-nav">
    <button id="btn-prev" onclick="navSemana(-1)" disabled title="Semana anterior">←</button>
    <button id="btn-latest" onclick="irUltima()">Semana actual</button>
    <button id="btn-next" onclick="navSemana(1)" disabled title="Semana siguiente">→</button>
  </div>
</header>

<div class="main">

  <div class="search-bar">
    <span class="search-icon">⌕</span>
    <input type="text" id="search-input" placeholder="Buscar empleado..." oninput="filtrarEmpleados(this.value)">
  </div>

  <div id="malla-container">
    <div class="card skeleton">
      <div style="padding:16px">
        <div class="skel-header"></div>
        <div class="skel-row"></div>
        <div class="skel-row"></div>
        <div class="skel-row"></div>
        <div class="skel-row" style="width:70%"></div>
      </div>
    </div>
  </div>

  <div id="historial-section" style="display:none">
    <div class="hist-title">Semanas anteriores</div>
    <div class="hist-grid" id="hist-grid"></div>
  </div>

</div>

<footer>Malla de Turnos · El Buen Gusto · Solo lectura · Actualizada automáticamente</footer>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxX9LaIAcbNFhMLWdxZDDY7dY80j8aAupf8DpRVqoK2E6OkIXo6-l2ujbC7uXpqUWg5/exec';

let todasMallas = [];
let idxActual = 0;
let filtroTexto = '';

const DIAS_LABEL = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const DIAS_KEY = ['lunes','martes','miercoles','jueves','viernes','sabado','domingo'];

async function cargarMallas() {
  try {
    const url = APPS_SCRIPT_URL + '?action=getMallas&t=' + Date.now();
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.ok && data.mallas && data.mallas.length) {
      todasMallas = data.mallas;
      idxActual = 0;
      renderMalla(idxActual);
      renderHistorial();
    } else {
      mostrarVacio('No hay mallas publicadas aún', 'El coordinador del área publicará la malla de cada semana aquí.');
    }
  } catch(e) {
    mostrarVacio('No se pudo cargar la malla', 'Verifica tu conexión e intenta de nuevo. Si el problema persiste contacta al coordinador.');
  }
}

function renderMalla(idx) {
  const m = todasMallas[idx];
  if (!m) return;

  document.getElementById('header-semana').textContent = 'Semana: ' + m.semana;
  document.getElementById('btn-prev').disabled = idx >= todasMallas.length - 1;
  document.getElementById('btn-next').disabled = idx <= 0;
  document.getElementById('btn-latest').classList.toggle('active', idx === 0);

  const emps = filtroTexto
    ? m.empleados.filter(e => e.nombre.toLowerCase().includes(filtroTexto.toLowerCase()))
    : m.empleados;

  let html = `<div class="card">
    <div class="card-header">
      <div>
        <div class="semana-label">Semana del ${m.semana}</div>
        ${m.aprobada ? `<div class="aprobada-label">Publicada el ${m.aprobada}</div>` : ''}
      </div>
      <span style="font-size:11px;background:#E1F5EE;color:#085041;padding:3px 10px;border-radius:20px;font-weight:500">${idx === 0 ? 'Semana actual' : 'Histórico'}</span>
    </div>
    <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-name">Colaborador</th>
          <th class="col-role">Cargo</th>
          <th>Lun</th><th>Mar</th><th>Mié</th><th>Jue</th><th>Vie</th>
          <th class="th-sat">Sáb</th><th class="th-sun">Dom</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>`;

  if (!emps.length) {
    html += `<tr><td colspan="10" style="padding:20px;text-align:center;color:#888;font-size:12px">
      ${filtroTexto ? 'No se encontró "' + filtroTexto + '" en esta semana.' : 'Sin datos'}
    </td></tr>`;
  } else {
    emps.forEach(emp => {
      const totalStr = String(emp.total || '');
      const totalNum = parseInt(totalStr) || 0;
      const totalClass = totalNum > 44 ? 'total-warn' : 'total-ok';
      html += `<tr>
        <td class="col-name">${highlight(emp.nombre)}</td>
        <td class="col-role">${emp.cargo || ''}</td>`;

      [emp.lunes, emp.martes, emp.miercoles, emp.jueves, emp.viernes].forEach(v => {
        html += `<td>${turnoCell(v)}</td>`;
      });
      html += `<td class="td-sat">${turnoCell(emp.sabado)}</td>`;
      html += `<td class="td-sun">${turnoCell(emp.domingo)}</td>`;
      html += `<td><span class="turno ${totalClass}">${totalStr}</span></td>`;
      html += `</tr>`;
    });
  }

  html += `</tbody></table></div>
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#E1F5EE"></div>Turno laboral</div>
    <div class="leg-item"><div class="leg-dot" style="background:#F1EFE8"></div>D = Descanso</div>
    <div class="leg-item"><div class="leg-dot" style="background:#E6F1FB"></div>V = Vacaciones</div>
    <div class="leg-item"><div class="leg-dot" style="background:#FAEEDA"></div>F = Día familia</div>
    <div class="leg-item"><div class="leg-dot" style="background:#EEEDFE"></div>C = Compensatorio</div>
    <div class="leg-item"><div class="leg-dot" style="background:#FCEBEB"></div>INV = Inventario</div>
    <div class="leg-item" style="margin-left:auto;color:#aaa">Horas no incluyen almuerzo (mar–vie)</div>
  </div>
  </div>`;

  document.getElementById('malla-container').innerHTML = html;
  document.getElementById('historial-section').style.display = 'block';

  document.querySelectorAll('.hist-card').forEach((c, i) => {
    c.classList.toggle('current', i === idx);
  });
}

function turnoCell(val) {
  const v = String(val || '').trim();
  if (!v || v === '0') return '<span class="turno t-D">—</span>';
  if (v === 'D') return '<span class="turno t-D">Descanso</span>';
  if (v === 'V') return '<span class="turno t-V">Vacaciones</span>';
  if (v === 'F') return '<span class="turno t-F">Día familia</span>';
  if (v === 'C') return '<span class="turno t-C">Compensatorio</span>';
  if (v.includes('INV') || v.includes('6am')) return '<span class="turno t-INV">Inventario<br>6am</span>';
  // Work shift: value is "8am\n5pm" or "8am-5pm" — parse and show with lunch indicator
  const cleaned = v.replace('\n', '-');
  const parts = cleaned.split('-');
  if (parts.length >= 2) {
    const entrada = parts[0].trim();
    const resto = parts.slice(1).join('-').trim();
    // Check if lunch is indicated (column after hours usually has +alm or similar from sheets)
    const tieneAlm = v.includes('+alm') || v.includes('alm');
    return `<span class="turno t-work"><span class="t-entrada">${entrada}</span><span class="t-separador">→</span><span class="t-salida">${resto}</span>${tieneAlm ? '<span class="t-alm">+alm</span>' : ''}</span>`;
  }
  return `<span class="turno t-work">${v}</span>`;
}

function highlight(text) {
  if (!filtroTexto) return text;
  const re = new RegExp('(' + filtroTexto.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re, '<mark class="highlight">$1</mark>');
}

function renderHistorial() {
  const grid = document.getElementById('hist-grid');
  grid.innerHTML = todasMallas.map((m, i) =>
    `<div class="hist-card ${i === idxActual ? 'current' : ''}" onclick="irSemana(${i})">
      <div class="hist-week">${m.semana}</div>
      <div class="hist-meta">${m.empleados ? m.empleados.length + ' colaboradores' : ''}</div>
      ${i === 0 ? '<span class="hist-badge">Semana actual</span>' : ''}
    </div>`
  ).join('');
}

function irSemana(idx) {
  idxActual = idx;
  renderMalla(idx);
  renderHistorial();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function navSemana(dir) {
  const nuevo = idxActual + dir;
  if (nuevo >= 0 && nuevo < todasMallas.length) irSemana(nuevo);
}

function irUltima() {
  irSemana(0);
}

function filtrarEmpleados(texto) {
  filtroTexto = texto.trim();
  renderMalla(idxActual);
}

function mostrarVacio(titulo, sub) {
  document.getElementById('malla-container').innerHTML = `
    <div class="card">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">${titulo}</div>
        <div class="empty-sub">${sub}</div>
      </div>
    </div>`;
}

cargarMallas();
</script>
</body>
</html>
